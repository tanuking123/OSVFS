name: PR Build and Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Deny-by-default at the workflow level. Each job re-declares the minimum it
# needs. This limits blast radius if any step or third-party action becomes
# compromised.
permissions: {}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-unit-test:
    name: Build & Unit Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # CI doesn't push, so don't leave the GITHUB_TOKEN in .git/config.
          persist-credentials: false

      - name: Setup .NET
        # actions/setup-dotnet@v5.2.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        # actions/cache@v5.0.5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', 'Directory.Packages.props', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore (locked)
        run: dotnet restore S3Files.Windows.slnx --locked-mode

      - name: Build (Release)
        run: dotnet build S3Files.Windows.slnx --configuration Release --no-restore

      - name: Unit tests
        run: >
          dotnet test tests/S3Files.Windows.UnitTests/S3Files.Windows.UnitTests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=unit.trx"
          --logger "console;verbosity=normal"
          --results-directory TestResults

      - name: Upload unit test results
        if: always()
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: unit-test-results
          path: TestResults/*.trx
          if-no-files-found: warn

  integration-test:
    name: Integration Tests (LocalStack on Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup .NET
        # actions/setup-dotnet@v5.0.5
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        # actions/cache@v5.0.5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', 'Directory.Packages.props', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Restore only the projects reachable from IntegrationTests (Core +
      # IntegrationTests). The Windows host project pulls in Microsoft.Windows.ProjFS
      # which is not buildable on Linux, but it is not referenced from these tests.
      - name: Restore (locked)
        run: dotnet restore tests/S3Files.Windows.IntegrationTests/S3Files.Windows.IntegrationTests.csproj --locked-mode

      - name: Build integration tests (Release)
        run: >
          dotnet build tests/S3Files.Windows.IntegrationTests/S3Files.Windows.IntegrationTests.csproj
          --configuration Release
          --no-restore

      - name: Integration tests
        run: >
          dotnet test tests/S3Files.Windows.IntegrationTests/S3Files.Windows.IntegrationTests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=integration.trx"
          --logger "console;verbosity=normal"
          --results-directory TestResults

      - name: Upload integration test results
        if: always()
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: integration-test-results
          path: TestResults/*.trx
          if-no-files-found: warn

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Dependency Review
        # actions/dependency-review-action@v4.9.0
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
