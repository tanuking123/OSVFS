name: PR Build and Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Deny-by-default at the workflow level. Each job re-declares the minimum it
# needs. This limits blast radius if any step or third-party action becomes
# compromised.
permissions: {}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-unit-test:
    name: Build & Unit Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # CI doesn't push, so don't leave the GITHUB_TOKEN in .git/config.
          persist-credentials: false

      - name: Setup .NET
        # actions/setup-dotnet@v4.3.1
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        # actions/cache@v4.3.0
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', 'Directory.Packages.props', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore (locked)
        run: dotnet restore S3Files.Windows.slnx --locked-mode

      - name: Build (Release)
        run: dotnet build S3Files.Windows.slnx --configuration Release --no-restore

      - name: Unit tests
        run: >
          dotnet test tests/S3Files.Windows.UnitTests/S3Files.Windows.UnitTests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=unit.trx"
          --logger "console;verbosity=normal"
          --results-directory TestResults

      - name: Upload unit test results
        if: always()
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unit-test-results
          path: TestResults/*.trx
          if-no-files-found: warn

  integration-test:
    name: Integration Tests (LocalStack on Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup .NET
        # actions/setup-dotnet@v4.3.1
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        # actions/cache@v4.3.0
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', 'Directory.Packages.props', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Restore only the projects reachable from IntegrationTests (Core +
      # IntegrationTests). The Windows host project pulls in Microsoft.Windows.ProjFS
      # which is not buildable on Linux, but it is not referenced from these tests.
      - name: Restore (locked)
        run: dotnet restore tests/S3Files.Windows.IntegrationTests/S3Files.Windows.IntegrationTests.csproj --locked-mode

      - name: Build integration tests (Release)
        run: >
          dotnet build tests/S3Files.Windows.IntegrationTests/S3Files.Windows.IntegrationTests.csproj
          --configuration Release
          --no-restore

      - name: Integration tests
        run: >
          dotnet test tests/S3Files.Windows.IntegrationTests/S3Files.Windows.IntegrationTests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=integration.trx"
          --logger "console;verbosity=normal"
          --results-directory TestResults

      - name: Upload integration test results
        if: always()
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: integration-test-results
          path: TestResults/*.trx
          if-no-files-found: warn
